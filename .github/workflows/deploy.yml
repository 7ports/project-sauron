name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'monitoring/**'
      - 'infrastructure/**'
      - '.env.example'

  workflow_dispatch:  # Allow manual triggers

jobs:
  deploy:
    name: Deploy monitoring stack to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/project-sauron

            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "Pulling updated Docker images..."
            # Run all docker compose commands from the project root so that Docker Compose
            # picks up the .env file at /opt/project-sauron/.env (not monitoring/.env)
            docker compose -f monitoring/docker-compose.yml -f monitoring/docker-compose.monitoring.yml pull

            echo "Restarting services with zero-downtime..."
            # Include the monitoring override to ensure Alloy is started alongside the main stack
            docker compose -f monitoring/docker-compose.yml -f monitoring/docker-compose.monitoring.yml up -d --remove-orphans

            echo "Checking container health..."
            sleep 10
            docker compose -f monitoring/docker-compose.yml -f monitoring/docker-compose.monitoring.yml ps

            echo "Reloading Prometheus config..."
            curl -s -X POST http://localhost:9090/-/reload || echo "Prometheus reload failed (may not be running yet)"

            echo "Restarting Grafana to re-read provisioning files..."
            # Grafana reads datasource and dashboard provisioning ONLY at startup.
            # docker compose up -d does NOT restart containers when only bind-mounted
            # files change. Force a restart so Grafana picks up any datasource UID
            # changes, deleteDatasources directives, or new dashboard provider paths.
            docker compose -f monitoring/docker-compose.yml -f monitoring/docker-compose.monitoring.yml restart grafana || echo "Grafana restart skipped"

            echo "Reloading nginx config..."
            # docker compose up -d does not restart nginx when only the volume-mounted
            # nginx.conf.template changes. nginx -s reload tells the running nginx worker
            # to re-read its /etc/nginx/nginx.conf (the envsubst-generated file).
            # NOTE: to pick up changes to nginx.conf.template itself, the nginx container
            # must be restarted (envsubst runs at startup). Use --force-recreate=nginx if needed.
            docker compose -f monitoring/docker-compose.yml -f monitoring/docker-compose.monitoring.yml exec -T nginx nginx -s reload || echo "nginx reload skipped (container may not be running)"

            echo "Running post-deploy health check..."
            bash /opt/project-sauron/scripts/verify-stack.sh || echo "WARNING: Health check reported failures above"

            echo "Deployment complete."
