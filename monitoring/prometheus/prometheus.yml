global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: 'project-sauron'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Uncomment and configure when alertmanager is added:
          # - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # EC2 host metrics (CPU, memory, disk, network)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'sauron-ec2'

  # HTTP endpoint probing — frontend web traffic & API uptime
  # Add your real frontend and API URLs below
  - job_name: 'blackbox_http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # --- Replace with your real project URLs ---
          - https://example.com          # Personal site / frontend
          - https://api.example.com      # Backend API
          # ------------------------------------------
          # project-hammer: Toronto Island Ferry Tracker (onboarded by Helldiver Squadron Alpha)
          - https://ferries.yyz.live                              # Frontend SPA (S3/CloudFront)
          - https://project-hammer-api.fly.dev/api/health        # Backend health (Fly.io, yyz)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # HTTPS certificate expiry monitoring
  - job_name: 'blackbox_tls'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - example.com:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # AWS CloudWatch metrics bridge
  - job_name: 'cloudwatch'
    static_configs:
      - targets: ['cloudwatch-exporter:9106']
    scrape_interval: 60s  # CloudWatch has a 1-minute resolution

  # Pushgateway — for ephemeral/serverless job metrics
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # Loki self-metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics
