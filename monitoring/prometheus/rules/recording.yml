groups:
  - name: node_recording_rules
    interval: 30s
    rules:
      # CPU usage percentage per instance
      - record: instance:node_cpu_utilisation:rate5m
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      # Memory usage percentage
      - record: instance:node_memory_utilisation:ratio
        expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)

      # Disk usage percentage for root filesystem
      - record: instance:node_disk_utilisation:ratio
        expr: 1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})

      # Network receive rate (bytes/s)
      - record: instance:node_network_receive_bytes:rate5m
        expr: sum by(instance) (rate(node_network_receive_bytes_total{device!="lo"}[5m]))

      # Network transmit rate (bytes/s)
      - record: instance:node_network_transmit_bytes:rate5m
        expr: sum by(instance) (rate(node_network_transmit_bytes_total{device!="lo"}[5m]))

  - name: http_recording_rules
    interval: 30s
    rules:
      # Endpoint availability ratio over 5 minutes
      - record: endpoint:probe_success:rate5m
        expr: avg_over_time(probe_success[5m])

      # P95 response time per endpoint
      - record: endpoint:probe_duration_seconds:p95_5m
        expr: quantile_over_time(0.95, probe_duration_seconds[5m])
