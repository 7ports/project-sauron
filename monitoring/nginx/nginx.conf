# nginx.conf for project-sauron
# Serves: Grafana (proxy), Prometheus remote_write (auth), Loki push (auth)
#
# IMPORTANT: This file is used as an envsubst template at container startup.
# The placeholders ${NGINX_DOMAIN} and ${PUSH_BEARER_TOKEN} are substituted
# by Docker using envsubst before nginx starts. Do NOT hardcode values here.
#
# The nginx service in docker-compose.yml mounts this file as nginx.conf.template
# and runs: envsubst '$$NGINX_DOMAIN $$PUSH_BEARER_TOKEN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
# Required env vars on the nginx container: NGINX_DOMAIN, PUSH_BEARER_TOKEN

events {
    worker_connections 1024;
}

http {
    # Rate limiting for push endpoints — 100 req/s per IP with burst headroom
    limit_req_zone $binary_remote_addr zone=push_limit:10m rate=100r/s;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name _;

        # Allow certbot webroot challenges through before redirect
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name ${NGINX_DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${NGINX_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${NGINX_DOMAIN}/privkey.pem;

        # Modern SSL — TLS 1.2+ only, server cipher preference disabled
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Grafana UI — no additional auth (Grafana handles its own login)
        location / {
            proxy_pass         http://grafana:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Prometheus remote_write receiver — Bearer token required
        # Used by external agents pushing metrics into this Sauron instance
        location /metrics/push {
            limit_req zone=push_limit burst=200 nodelay;

            if ($http_authorization != "Bearer ${PUSH_BEARER_TOKEN}") {
                return 401 "Unauthorized";
            }

            proxy_pass         http://prometheus:9090/api/v1/write;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Pushgateway push endpoint — Prometheus text format (used by MCP servers, batch jobs, cron tasks)
        # Client sends: POST /metrics/gateway/metrics/job/<job_name>
        # Auth: Bearer token (same PUSH_BEARER_TOKEN as other push endpoints)
        location /metrics/gateway/ {
            limit_req zone=push_limit burst=200 nodelay;

            if ($http_authorization != "Bearer ${PUSH_BEARER_TOKEN}") {
                return 401 "Unauthorized";
            }

            proxy_pass         http://pushgateway:9091/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Loki push endpoint — Bearer token required
        # Used by Promtail / alloy agents on monitored hosts
        location /loki/api/v1/push {
            limit_req zone=push_limit burst=200 nodelay;

            if ($http_authorization != "Bearer ${PUSH_BEARER_TOKEN}") {
                return 401 "Unauthorized";
            }

            proxy_pass         http://loki:3100/loki/api/v1/push;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
