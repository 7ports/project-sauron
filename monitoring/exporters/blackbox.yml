modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions:
        - "HTTP/1.1"
        - "HTTP/2.0"
      valid_status_codes: []  # Defaults to 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: false

  http_post_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions:
        - "HTTP/1.1"
        - "HTTP/2.0"
      method: POST
      follow_redirects: true

  tcp_connect:
    prober: tcp
    timeout: 10s
    tcp:
      tls: true
      tls_config:
        insecure_skip_verify: false

  dns_soa:
    prober: dns
    timeout: 10s
    dns:
      query_name: "ns1.example.com"
      query_type: "SOA"
