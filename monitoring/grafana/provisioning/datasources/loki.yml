apiVersion: 1

# Force-delete any stale auto-generated datasource (created before uid was set).
# This ensures only one "Loki" datasource exists with uid: loki.
deleteDatasources:
  - name: Loki
    orgId: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
